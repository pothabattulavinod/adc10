name: MKV to HLS 

on:
workflow_dispatch:

jobs:
convert:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4
    with:
      persist-credentials: false
      fetch-depth: 0

  - name: Install FFmpeg
    run: |
      sudo apt-get update
      sudo apt-get install -y ffmpeg

  - name: Convert MKV to HLS (Telugu Audio)
    run: |
      set -e

      INPUT_URL="https://hub.obsession.buzz/e6aa49dc04deb1f85b65fadaf861a8ab"
      OUTPUT_FOLDER="peddi"
      OUTPUT_PATH="$OUTPUT_FOLDER/playlist.m3u8"

      mkdir -p "$OUTPUT_FOLDER"

      echo "🎬 Converting MKV to HLS using Telugu audio stream..."

      ffmpeg -y \
        -i "$INPUT_URL" \
        -map 0:v:0 \
        -map 0:2 \
        -c:v copy \
        -c:a aac \
        -b:a 384k \
        -ac 2 \
        -f hls \
        -hls_time 10 \
        -hls_playlist_type vod \
        -hls_segment_filename "$OUTPUT_FOLDER/segment%03d.ts" \
        "$OUTPUT_PATH"

      echo "✅ HLS conversion completed."

  - name: Commit and push HLS output
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
    run: |
      git config --global user.name "pothabattulavinod"
      git config --global user.email "vinodyadavpothabattula666@gmail.com"

      git add peddi

      if ! git diff-index --quiet HEAD; then
        git commit -m "Add Telugu HLS output [skip ci]"
      else
        echo "No new files to commit."
      fi

      git remote remove origin || true
      git remote add origin https://x-access-token:${GH_PAT}@github.com/pothabattulavinod/adc10.git
      git push origin HEAD:main
```
